<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ClinData - Prototipo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- NAVBAR -->
    <header class="navbar">
        <h1>ClinData</h1>
        <span>Sistema de Expediente Clínico</span>
    </header>

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="container">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <button onclick="navigate('patients')">Pacientes</button>
            <button onclick="navigate('newPatient')">Nuevo Paciente</button>
            <button onclick="navigate('medicalRecord')">Expediente</button>
        </aside>

        <!-- CONTENIDO DINÁMICO -->
        <main id="app">

            <!-- FORMULARIO INICIAL -->
            <section id="newPatientSection" class="section active">
                <h2>Registro de Paciente</h2>

                <form id="patientForm">
                    <input type="text" id="name" placeholder="Nombre completo" required>
                    <input type="number" id="age" placeholder="Edad" required>
                    
                    <select id="sex" required>
                        <option value="">Sexo</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Femenino">Femenino</option>
                    </select>

                    <input type="text" id="address" placeholder="Domicilio" required>

                    <button type="submit">Guardar</button>
                </form>
            </section>

            <!-- LISTA DE PACIENTES -->
            <section id="patientsSection" class="section">
                <h2>Pacientes</h2>
                <input type="text" id="search" placeholder="Buscar paciente...">
                <div id="patientList"></div>
            </section>

            <!-- EXPEDIENTE (placeholder) -->
            <section id="medicalRecordSection" class="section">
                <h2>Expediente Clínico</h2>

                <h3 id="patientName"></h3>

                <form id="recordForm">

                    <textarea id="interrogatorio" placeholder="Interrogatorio"></textarea>

                    <textarea id="antecedentes" placeholder="Antecedentes"></textarea>

                    <textarea id="padecimiento" placeholder="Padecimiento actual"></textarea>

                    <textarea id="exploracion" placeholder="Exploración física"></textarea>

                    <textarea id="diagnostico" placeholder="Diagnóstico"></textarea>
                    <div id="suggestionsBox" class="suggestions-box"></div> <!-- Caja de sugerencias -->
                    <div id="diagnosticoPreview" class="preview-box"></div> <!-- Abreviaturas -->

                    <textarea id="tratamiento" placeholder="Tratamiento"></textarea>

                    <button type="submit">Guardar expediente</button>
                </form>
                <button onclick="exportPDF('patient')">Exportar PDF (Paciente)</button>
                <button onclick="exportPDF('doctor')">Exportar PDF (Médico)</button>
            </section>

        </main>

    </div>

    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
